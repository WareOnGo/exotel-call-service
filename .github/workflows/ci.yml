name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: build · vet · test (sqlite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt'd:"; echo "$unformatted"; exit 1
          fi
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  test-postgres:
    name: test (real postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      # Same suite, real engine — catches Postgres-specific SQL the SQLite run can't.
      # -p 1: packages share one Postgres and truncate between tests, so they
      # must run one at a time (no cross-package truncation races).
      - run: go test -p 1 -count=1 ./...
